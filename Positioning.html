<!DOCTYPE html>
<html>
<head>
<style>
    div {
        right: 30px;
        border: 3px solid #1ad4c8
    }
    div.absolute {
        position: absolute;
        left: 50px;
        border: 3px solid pink;
    }
    div.relative {
        position: relative;
        left: 100px;
        border: 3px solid rebeccapurple
    }
    div.fixed {
        position: fixed;
        top:0;
        right: 20px;
        width: 300px;
        border: 3px solid turquoise;
    }
    div.sticky {
        position: sticky;
        top: 1px;
        lest: 20px;
        width: 100px;
        border: 3px solid lavender
    }
</style>
</head>
<body>
    <h2>POSITIONING</h2>
    <div>
        Div with no position property
    </div>
    <div class="sticky">
        Div with sticky position property
    </div>
    <div class="relative">
        This div element has position: relative;
         <div class="absolute">
            Absolute class DIV
         </div>
    </div>
    <div class="fixed">
        Div with fixed position property
    </div>
